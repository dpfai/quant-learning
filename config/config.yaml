data:
  cache_dir: "data/cache"
  cache_max_age_hours: 24
  default_period: "2y"

risk:
  risk_free_rate: 0.05

llm:
  provider: "qianfan"
  model: "glm-5.2"
  base_url: "https://ark.cn-beijing.volces.com/api/coding/v3"
  api_format: "chat_completions"
  fallback_models:
    - "deepseek-v4-pro"
    - "kimi-k2.6"

ui:
  theme: "light"
  default_tickers:
    - SPY
    - QQQ
    - DIA
