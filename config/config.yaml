data:
  cache_dir: "data/cache"
  cache_max_age_hours: 24
  default_period: "2y"

risk:
  risk_free_rate: 0.05

llm:
  provider: "qianfan"
  model: "glm-5"
  base_url: "https://qianfan.baidubce.com/v2/coding"
  api_format: "chat_completions"
  fallback_models:
    - "deepseek-v3.2"
    - "kimi-k2.5"

ui:
  theme: "light"
  default_tickers:
    - SPY
    - QQQ
    - DIA
